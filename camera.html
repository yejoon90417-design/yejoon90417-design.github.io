<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Naruto Cam FX</title>
  <script
    async
    src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1492932683312516"
    crossorigin="anonymous"
  ></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <section class="screen screen-active" id="cameraScreen">
      <video id="cameraVideo" autoplay playsinline muted></video>
      <canvas id="cameraCanvas"></canvas>

      <div class="hud">
        <button class="back-button" id="backButton" type="button">뒤로</button>
      </div>

      <div class="tuning-panel">
        <div class="tuning-row">
          <span class="tuning-label">크기</span>
          <input id="tuningScale" class="tuning-slider" type="range" min="40" max="240" step="1" value="100">
          <output class="tuning-value" id="tuningScaleValue">100%</output>
        </div>
        <div class="tuning-row">
          <span class="tuning-label">배경컷</span>
          <input id="tuningEdgeThreshold" class="tuning-slider" type="range" min="0" max="120" step="1" value="30">
          <output class="tuning-value" id="tuningEdgeThresholdValue">30</output>
        </div>
        <div class="tuning-row">
          <span class="tuning-label">테두리</span>
          <input id="tuningEdgeSoftness" class="tuning-slider" type="range" min="1" max="120" step="1" value="36">
          <output class="tuning-value" id="tuningEdgeSoftnessValue">36</output>
        </div>
        <div class="tuning-row">
          <span class="tuning-label">컷강도</span>
          <input id="tuningAlphaPower" class="tuning-slider" type="range" min="50" max="300" step="1" value="140">
          <output class="tuning-value" id="tuningAlphaPowerValue">1.40</output>
        </div>
        <div class="tuning-row">
          <span class="tuning-label">전체화면</span>
          <input id="tuningFullscreenScale" class="tuning-slider" type="range" min="70" max="180" step="1" value="100">
          <output class="tuning-value" id="tuningFullscreenScaleValue">100%</output>
        </div>
        <button class="tuning-reset" id="tuningResetButton" type="button">기본값</button>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  <script src="app.js" defer></script>
</body>
</html>
