<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Naruto Cam FX</title>
  <script
    async
    src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1492932683312516"
    crossorigin="anonymous"
  ></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <section class="screen screen-active" id="cameraScreen">
      <video id="cameraVideo" autoplay playsinline muted></video>
      <canvas id="cameraCanvas"></canvas>

      <div class="hud">
        <button class="back-button" id="backButton" type="button">뒤로</button>
      </div>

      <div class="size-panel">
        <input
          id="sizeSlider"
          class="size-slider"
          type="range"
          min="40"
          max="240"
          step="1"
          value="100"
        >
        <button class="size-reset" id="sizeResetButton" type="button">100%</button>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  <script src="app.js" defer></script>
</body>
</html>
